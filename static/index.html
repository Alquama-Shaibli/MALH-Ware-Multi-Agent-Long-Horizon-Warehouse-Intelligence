<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Warehouse Fleet Dashboard</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f172a;
            color: #e2e8f0;
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
        }
        .banner {
            background: linear-gradient(90deg, #1e3a8a 0%, #312e81 100%);
            width: 100%;
            max-width: 780px;
            text-align: center;
            padding: 8px;
            border-radius: 8px;
            margin-bottom: 10px;
            border: 1px solid #3b82f6;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            flex-shrink: 0;
        }
        h1 {
            color: #38bdf8;
            margin: 0;
            font-size: 16px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        #main-container {
            height: calc(100vh - 80px);
            width: 100%;
            max-width: 780px;
            display: flex;
            flex-direction: row;
            gap: 12px;
            background: #1e293b;
            padding: 12px;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
        }
        #left-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
        }
        #right-panel {
            width: 240px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            overflow-y: auto;
            padding-right: 5px;
        }
        .canvas-container {
            position: relative;
            border-radius: 8px;
            transition: box-shadow 0.2s;
        }
        .fleet-ai-flash {
            box-shadow: 0 0 40px #06b6d4, inset 0 0 20px #06b6d4;
        }
        #gridCanvas {
            background-color: #334155;
            border-radius: 8px;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.5);
            display: block;
            max-height: 380px;
            max-width: 380px;
        }
        .overlay-msg {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-weight: bold;
            font-size: 16px;
            text-shadow: 2px 2px 4px #000;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            background: rgba(15, 23, 42, 0.85);
            padding: 8px 20px;
            border-radius: 20px;
            white-space: nowrap;
        }
        .card {
            background: #0f172a;
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid #38bdf8;
            flex-shrink: 0;
        }
        .card h3 {
            margin: 0 0 10px 0;
            font-size: 14px;
            color: #94a3b8;
            text-transform: uppercase;
        }
        .stat-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
            font-size: 14px;
        }
        .value {
            font-weight: bold;
            color: #f8fafc;
        }
        .agent1-color { color: #3b82f6; }
        .agent2-color { color: #22c55e; }
        .controls {
            margin-top: 10px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            width: 100%;
            max-width: 380px;
        }
        button {
            background: #38bdf8;
            color: #0f172a;
            border: none;
            padding: 10px 16px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            flex-grow: 1;
            text-transform: uppercase;
            font-size: 12px;
        }
        button:hover { background: #0ea5e9; transform: translateY(-1px); }
        button.danger { background: #ef4444; color: white; }
        button.danger:hover { background: #dc2626; }
        button.demo { background: #a855f7; color: white; }
        button.demo:hover { background: #9333ea; }
        button.demo.active { background: #f59e0b; }
        .chart-container {
            position: relative;
            height: 110px;
            width: 100%;
            margin-top: 8px;
            background: white;
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <div class="banner">
        <h1>🚀 Smart Warehouse Live Simulation (Multi-Agent AI)</h1>
    </div>

    <div id="main-container">
        <div id="left-panel">
            <div class="canvas-container" id="canvasContainer">
                <canvas id="gridCanvas" width="500" height="500"></canvas>
                <div id="overlayMsg" class="overlay-msg"></div>
            </div>
            <div class="controls">
                <button id="learnBtn" class="demo" onclick="toggleLearning()">[ Start Learning Demo ]</button>
                <button onclick="fetchState()">Refresh</button>
                <button class="danger" onclick="resetEnv('hard')">Reset Env</button>
            </div>
        </div>

        <div id="right-panel">
            <div class="card" style="border-left-color: #a855f7;">
                <h3>Live Learning Metrics</h3>
                <div class="stat-row"><span>Episode Number:</span> <span class="value" id="episode">1</span></div>
                <div class="stat-row"><span>Total Collisions:</span> <span class="value" id="collisions" style="color: #ef4444;">0</span></div>
                <div class="chart-container">
                    <canvas id="chart"></canvas>
                </div>
            </div>

            <div class="card">
                <h3>Environment State</h3>
                <div class="stat-row"><span>Items Remaining:</span> <span class="value" id="items">-</span></div>
                <div class="stat-row"><span>Deliveries Made:</span> <span class="value" id="deliveries">0</span></div>
            </div>

            <div class="card" style="border-left-color: #3b82f6;">
                <h3>Agent 1 (Blue)</h3>
                <div class="stat-row"><span>Battery:</span> <span class="value agent1-color" id="battery1">-</span></div>
                <div class="stat-row"><span>Carrying:</span> <span class="value agent1-color" id="carry1">-</span></div>
            </div>

            <div class="card" style="border-left-color: #22c55e;">
                <h3>Agent 2 (Green)</h3>
                <div class="stat-row"><span>Battery:</span> <span class="value agent2-color" id="battery2">-</span></div>
                <div class="stat-row"><span>Carrying:</span> <span class="value agent2-color" id="carry2">-</span></div>
            </div>
        </div>
    </div>

    <!-- Chart.js for graph tracking -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        let currentEpisode = 1;
        let running = false;
        let chartInstance = null;
        let rewards = [];

        // Global Canvas Setup (FIXED SIZE)
        const canvas = document.getElementById("gridCanvas");
        const ctx = canvas.getContext("2d");
        canvas.width = 380;
        canvas.height = 380;

        async function fetchState() {
          try {
            const res = await fetch("/state");
            const data = await res.json();

            if (!data || !data.agents || Object.keys(data.agents).length === 0) return;

            updateUI(data);
            drawGrid(data);

          } catch (err) {
            console.error("State fetch error:", err);
          }
        }

        function updateUI(data) {
          document.getElementById("episode").innerText = currentEpisode;
          document.getElementById("collisions").innerText = data.collisions;

          // Items remaining = total orders - completed (pending orders)
          const pending = (data.total_orders || data.items.length) - (data.deliveries || 0);
          document.getElementById("items").innerText = Math.max(0, pending);
          document.getElementById("deliveries").innerText = data.deliveries;

          if (data.agents.agent1) {
              document.getElementById("battery1").innerText = data.agents.agent1.battery;
              document.getElementById("carry1").innerText = data.agents.agent1.carrying ? "YES" : "NO";
          }

          if (data.agents.agent2) {
              document.getElementById("battery2").innerText = data.agents.agent2.battery;
              document.getElementById("carry2").innerText = data.agents.agent2.carrying ? "YES" : "NO";
          }
        }

        function drawGrid(data) {
          const size = data.grid_size || 10;
          const cell = canvas.width / size;

          ctx.clearRect(0, 0, canvas.width, canvas.height);

          // Grid lines
          ctx.strokeStyle = '#475569';
          ctx.lineWidth = 0.5;
          for(let i=0; i<=size; i++) {
              ctx.beginPath(); ctx.moveTo(i*cell, 0); ctx.lineTo(i*cell, canvas.height); ctx.stroke();
              ctx.beginPath(); ctx.moveTo(0, i*cell); ctx.lineTo(canvas.width, i*cell); ctx.stroke();
          }

          // Draw CHARGE STATION (cyan square)
          if (data.charge_station) {
            const cx = data.charge_station.x, cy = data.charge_station.y;
            ctx.fillStyle = 'rgba(6, 182, 212, 0.4)';
            ctx.fillRect(cx * cell + 2, cy * cell + 2, cell - 4, cell - 4);
            ctx.strokeStyle = '#06b6d4';
            ctx.lineWidth = 2;
            ctx.strokeRect(cx * cell + 2, cy * cell + 2, cell - 4, cell - 4);
            ctx.fillStyle = '#06b6d4';
            ctx.font = `bold ${Math.floor(cell * 0.45)}px sans-serif`;
            ctx.textAlign = 'center';
            ctx.fillText('⚡', cx * cell + cell/2, cy * cell + cell * 0.65);
          }

          // Draw GOAL (green star zone)
          if (data.goal) {
            const gx = data.goal.x, gy = data.goal.y;
            ctx.fillStyle = 'rgba(34, 197, 94, 0.3)';
            ctx.fillRect(gx * cell + 2, gy * cell + 2, cell - 4, cell - 4);
            ctx.strokeStyle = '#22c55e';
            ctx.lineWidth = 2;
            ctx.strokeRect(gx * cell + 2, gy * cell + 2, cell - 4, cell - 4);
            ctx.fillStyle = '#22c55e';
            ctx.font = `bold ${Math.floor(cell * 0.45)}px sans-serif`;
            ctx.textAlign = 'center';
            ctx.fillText('🏁', gx * cell + cell/2, gy * cell + cell * 0.65);
          }

          // Draw items (only unclaimed ones in inventory)
          (data.items || []).forEach(item => {
            ctx.fillStyle = '#facc15';
            ctx.shadowColor = '#facc15';
            ctx.shadowBlur = 8;
            ctx.beginPath();
            ctx.arc(item.x * cell + cell/2, item.y * cell + cell/2, cell * 0.28, 0, Math.PI*2);
            ctx.fill();
            ctx.shadowBlur = 0;
          });

          // Draw obstacles
          (data.obstacles || []).forEach(obs => {
            ctx.fillStyle = '#ef4444';
            ctx.fillRect(obs.x * cell + 3, obs.y * cell + 3, cell - 6, cell - 6);
          });

          // Draw Agent 1 (Blue) — with carry indicator
          if (data.agents && data.agents.agent1) {
            const a = data.agents.agent1;
            ctx.shadowColor = '#3b82f6';
            ctx.shadowBlur = a.carrying ? 18 : 6;
            ctx.fillStyle = a.carrying ? '#60a5fa' : '#3b82f6';
            ctx.beginPath();
            ctx.arc(a.x * cell + cell/2, a.y * cell + cell/2, cell * 0.38, 0, Math.PI*2);
            ctx.fill();
            ctx.shadowBlur = 0;
            if (a.carrying) {
              // Show carried item as small yellow dot on agent
              ctx.fillStyle = '#facc15';
              ctx.beginPath();
              ctx.arc(a.x * cell + cell/2, a.y * cell + cell*0.25, cell * 0.12, 0, Math.PI*2);
              ctx.fill();
            }
            ctx.fillStyle = 'white';
            ctx.font = `bold ${Math.floor(cell*0.28)}px sans-serif`;
            ctx.textAlign = 'center';
            ctx.fillText('1', a.x * cell + cell/2, a.y * cell + cell*0.58);
          }

          // Draw Agent 2 (Green) — with carry indicator
          if (data.agents && data.agents.agent2) {
            const a = data.agents.agent2;
            ctx.shadowColor = '#22c55e';
            ctx.shadowBlur = a.carrying ? 18 : 6;
            ctx.fillStyle = a.carrying ? '#4ade80' : '#22c55e';
            ctx.beginPath();
            ctx.arc(a.x * cell + cell/2, a.y * cell + cell/2, cell * 0.38, 0, Math.PI*2);
            ctx.fill();
            ctx.shadowBlur = 0;
            if (a.carrying) {
              ctx.fillStyle = '#facc15';
              ctx.beginPath();
              ctx.arc(a.x * cell + cell/2, a.y * cell + cell*0.25, cell * 0.12, 0, Math.PI*2);
              ctx.fill();
            }
            ctx.fillStyle = 'white';
            ctx.font = `bold ${Math.floor(cell*0.28)}px sans-serif`;
            ctx.textAlign = 'center';
            ctx.fillText('2', a.x * cell + cell/2, a.y * cell + cell*0.58);
          }
        }

        function showOverlay(msg, color, duration=1500) {
            const el = document.getElementById('overlayMsg');
            if (!el) return;
            el.innerText = msg;
            el.style.color = color;
            el.style.opacity = 1;
            setTimeout(() => { el.style.opacity = 0; }, duration);
        }

        async function doAgentStep(agentId) {
            // 1. Get action from RL policy / Fleet AI coordinated heuristic
            const predRes = await fetch('/predict', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({agent_id: agentId})
            });
            const actionData = await predRes.json();

            // Surface Fleet AI coordination message to UI if present
            if (actionData.fleet_ai_coord) {
                showOverlay("🤝 " + actionData.fleet_ai_coord, "#a78bfa", 2000);
            }

            // 2. Build step body
            const stepBody = {
                agent_id: agentId,
                action_type: actionData.action_type || "move",
                direction: actionData.direction || null
            };

            // 3. Execute action
            const res = await fetch('/step', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(stepBody)
            });
            return await res.json();
        }

        async function stepEnv() {
            try {
                // Sequential steps: agent1 first, then agent2
                const d1 = await doAgentStep("agent1");
                const d2 = await doAgentStep("agent2");

                const reward = (d1.reward || 0) + (d2.reward || 0);
                updateGraph(reward);

                // Fleet AI flash on any intervention
                const canvasContainer = document.getElementById('canvasContainer');
                const explanation = (d1.info && d1.info.fleet_ai_explanation) || (d2.info && d2.info.fleet_ai_explanation);
                if (explanation) {
                    canvasContainer.classList.add('fleet-ai-flash');
                    showOverlay("⚡ " + explanation, "#06b6d4", 2000);
                    setTimeout(() => canvasContainer.classList.remove('fleet-ai-flash'), 400);
                }

                if (d1.done || d2.done) {
                    showOverlay("✅ Episode Complete! Resetting...", "#22c55e", 2000);
                    await new Promise(r => setTimeout(r, 1200));
                    await resetEnv('easy');
                }
            } catch(e) {
                // Don't freeze on network error — just log and continue
                console.warn("Step error (continuing):", e);
            }
        }

        function updateGraph(reward) {
          rewards.push(reward);
          if (rewards.length > 60) rewards.shift();

          const chartCtx = document.getElementById("chart").getContext("2d");

          // Reuse existing chart (update in-place) — much faster than destroy+recreate
          if (window.myChart) {
              window.myChart.data.labels = rewards.map((_, i) => i);
              window.myChart.data.datasets[0].data = rewards;
              window.myChart.update('none');  // 'none' = no animation = fastest
              return;
          }

          window.myChart = new Chart(chartCtx, {
            type: "line",
            data: {
              labels: rewards.map((_, i) => i),
              datasets: [{
                label: "Reward",
                data: rewards,
                borderColor: '#3b82f6',
                backgroundColor: 'rgba(59,130,246,0.1)',
                tension: 0.3,
                pointRadius: 2
              }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                animation: false,
                scales: {
                    x: { display: false }
                }
            }
          });
        }

        async function startDemo() {
          const btn = document.getElementById("learnBtn");
          if(running) {
              stopDemo();
              btn.innerText = "[ Start Learning Demo ]";
              btn.classList.remove("active");
              return;
          }
          
          btn.innerText = "[ Stop Learning Demo ]";
          btn.classList.add("active");
          running = true;

          while (running) {
            await stepEnv();
            await fetchState();
            // 700ms breathing room for HF Spaces CPU — prevents server overload
            await new Promise(r => setTimeout(r, 700));
          }
        }

        function stopDemo() {
          running = false;
        }

        function toggleLearning() {
            startDemo();
        }

        async function resetEnv(task) {
            try {
                await fetch('/reset', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({task: task})
                });
                rewards = [];
                if(window.myChart) {
                    window.myChart.destroy();
                    window.myChart = null;
                }
                currentEpisode++;
                fetchState();
            } catch (err) {}
        }

        // Initial fetch
        fetchState();
    </script>
</body>
</html>
