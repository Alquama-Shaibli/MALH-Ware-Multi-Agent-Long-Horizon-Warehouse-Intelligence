<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Warehouse Fleet Dashboard</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f172a;
            color: #e2e8f0;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .banner {
            background: linear-gradient(90deg, #1e3a8a 0%, #312e81 100%);
            width: 100%;
            max-width: 900px;
            text-align: center;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 1px solid #3b82f6;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        h1 {
            color: #38bdf8;
            margin: 0;
            font-size: 24px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .container {
            display: flex;
            gap: 20px;
            background: #1e293b;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
        }
        .canvas-container {
            position: relative;
            border-radius: 8px;
            transition: box-shadow 0.2s;
        }
        .fleet-ai-flash {
            box-shadow: 0 0 40px #06b6d4, inset 0 0 20px #06b6d4;
        }
        canvas {
            background-color: #334155;
            border-radius: 8px;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.5);
            display: block;
        }
        .overlay-msg {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-weight: bold;
            font-size: 16px;
            text-shadow: 2px 2px 4px #000;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            background: rgba(15, 23, 42, 0.85);
            padding: 8px 20px;
            border-radius: 20px;
            white-space: nowrap;
        }
        .panel {
            width: 300px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .card {
            background: #0f172a;
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid #38bdf8;
        }
        .card h3 {
            margin: 0 0 10px 0;
            font-size: 14px;
            color: #94a3b8;
            text-transform: uppercase;
        }
        .stat-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
            font-size: 14px;
        }
        .value {
            font-weight: bold;
            color: #f8fafc;
        }
        .agent1-color { color: #3b82f6; }
        .agent2-color { color: #22c55e; }
        .controls {
            margin-top: 15px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        button {
            background: #38bdf8;
            color: #0f172a;
            border: none;
            padding: 10px 16px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            flex-grow: 1;
            text-transform: uppercase;
            font-size: 12px;
        }
        button:hover { background: #0ea5e9; transform: translateY(-1px); }
        button.danger { background: #ef4444; color: white; }
        button.danger:hover { background: #dc2626; }
        button.demo { background: #a855f7; color: white; }
        button.demo:hover { background: #9333ea; }
        button.demo.active { background: #f59e0b; }
    </style>
</head>
<body>

    <div class="banner">
        <h1>🚀 Smart Warehouse Live Simulation (Multi-Agent AI)</h1>
    </div>

    <div class="container">
        <div>
            <div class="canvas-container" id="canvasContainer">
                <canvas id="gridCanvas" width="500" height="500"></canvas>
                <div id="overlayMsg" class="overlay-msg"></div>
            </div>
            <div class="controls">
                <button id="learnBtn" class="demo" onclick="toggleLearning()">[ Start Learning Demo ]</button>
                <button onclick="fetchState()">Refresh</button>
                <button class="danger" onclick="resetEnv('hard')">Reset Env</button>
            </div>
        </div>

        <div class="panel">
            <div class="card" style="border-left-color: #a855f7;">
                <h3>Live Learning Metrics</h3>
                <div class="stat-row"><span>Episode Number:</span> <span class="value" id="episode">1</span></div>
                <div class="stat-row"><span>Total Collisions:</span> <span class="value" id="collisions" style="color: #ef4444;">0</span></div>
                <canvas id="chart" width="280" height="150" style="margin-top:10px; background:white; border-radius:4px;"></canvas>
            </div>

            <div class="card">
                <h3>Environment State</h3>
                <div class="stat-row"><span>Items Remaining:</span> <span class="value" id="items">-</span></div>
                <div class="stat-row"><span>Deliveries Made:</span> <span class="value" id="deliveries">0</span></div>
            </div>

            <div class="card" style="border-left-color: #3b82f6;">
                <h3>Agent 1 (Blue)</h3>
                <div class="stat-row"><span>Battery:</span> <span class="value agent1-color" id="battery1">-</span></div>
                <div class="stat-row"><span>Carrying:</span> <span class="value agent1-color" id="carry1">-</span></div>
            </div>

            <div class="card" style="border-left-color: #22c55e;">
                <h3>Agent 2 (Green)</h3>
                <div class="stat-row"><span>Battery:</span> <span class="value agent2-color" id="battery2">-</span></div>
                <div class="stat-row"><span>Carrying:</span> <span class="value agent2-color" id="carry2">-</span></div>
            </div>
        </div>
    </div>

    <!-- Chart.js for graph tracking -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        let currentEpisode = 1;
        let running = false;
        let chartInstance = null;
        let rewards = [];

        async function fetchState() {
          try {
            const res = await fetch("/state");
            const data = await res.json();

            if (!data || !data.agents) return;

            updateUI(data);
            drawGrid(data);

          } catch (err) {
            console.error("State fetch error:", err);
          }
        }

        function updateUI(data) {
          document.getElementById("episode").innerText = currentEpisode;
          document.getElementById("collisions").innerText = data.collisions;

          document.getElementById("items").innerText = data.items.length;
          document.getElementById("deliveries").innerText = data.deliveries;

          if (data.agents.agent1) {
              document.getElementById("battery1").innerText = data.agents.agent1.battery;
              document.getElementById("carry1").innerText = data.agents.agent1.carrying ? "YES" : "NO";
          }

          if (data.agents.agent2) {
              document.getElementById("battery2").innerText = data.agents.agent2.battery;
              document.getElementById("carry2").innerText = data.agents.agent2.carrying ? "YES" : "NO";
          }
        }

        function drawGrid(data) {
          const canvas = document.getElementById("gridCanvas");
          const ctx = canvas.getContext("2d");

          const size = data.grid_size;
          const cell = canvas.width / size;

          ctx.clearRect(0, 0, canvas.width, canvas.height);

          // Grid lines
          ctx.strokeStyle = '#475569';
          ctx.lineWidth = 1;
          for(let i=0; i<=size; i++) {
              ctx.beginPath(); ctx.moveTo(i*cell, 0); ctx.lineTo(i*cell, canvas.height); ctx.stroke();
              ctx.beginPath(); ctx.moveTo(0, i*cell); ctx.lineTo(canvas.width, i*cell); ctx.stroke();
          }

          // Draw items
          data.items.forEach(item => {
            ctx.fillStyle = "yellow";
            ctx.beginPath();
            ctx.arc(item.x * cell + cell/2, item.y * cell + cell/2, cell * 0.3, 0, Math.PI*2);
            ctx.fill();
          });

          // Draw obstacles
          data.obstacles.forEach(obs => {
            ctx.fillStyle = "red";
            ctx.fillRect(obs.x * cell + 2, obs.y * cell + 2, cell - 4, cell - 4);
          });

          // Draw agents
          if (data.agents.agent1) {
              ctx.fillStyle = "blue";
              ctx.beginPath();
              ctx.arc(data.agents.agent1.x * cell + cell/2, data.agents.agent1.y * cell + cell/2, cell * 0.4, 0, Math.PI*2);
              ctx.fill();
          }

          if (data.agents.agent2) {
              ctx.fillStyle = "green";
              ctx.beginPath();
              ctx.arc(data.agents.agent2.x * cell + cell/2, data.agents.agent2.y * cell + cell/2, cell * 0.4, 0, Math.PI*2);
              ctx.fill();
          }
        }

        async function stepEnv() {
            // In a real environment, we would fetch optimal actions, but the prompt specified explicit actions
            try {
              let r1 = await fetch("/step", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({
                  agent_id: "agent1",
                  action_type: "move",
                  direction: "right"
                })
              });
              let d1 = await r1.json();
              updateGraph(d1.reward);

              let r2 = await fetch("/step", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({
                  agent_id: "agent2",
                  action_type: "move",
                  direction: "left"
                })
              });
              let d2 = await r2.json();
              updateGraph(d2.reward);
            } catch (err) {
                console.error("Step error:", err);
            }
        }

        function updateGraph(reward) {
          rewards.push(reward);
          // Keep array size manageable
          if (rewards.length > 50) rewards.shift();

          const ctx = document.getElementById("chart").getContext("2d");

          if (chartInstance) {
              chartInstance.data.labels = rewards.map((_, i) => i);
              chartInstance.data.datasets[0].data = rewards;
              chartInstance.update();
          } else {
              chartInstance = new Chart(ctx, {
                type: "line",
                data: {
                  labels: rewards.map((_, i) => i),
                  datasets: [{
                    label: "Reward",
                    data: rewards,
                    borderColor: 'blue',
                    tension: 0.1
                  }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    animation: false,
                    scales: {
                        x: { display: false }
                    }
                }
              });
          }
        }

        async function startDemo() {
          const btn = document.getElementById("learnBtn");
          if(running) {
              stopDemo();
              btn.innerText = "[ Start Learning Demo ]";
              btn.classList.remove("active");
              return;
          }
          
          btn.innerText = "[ Stop Learning Demo ]";
          btn.classList.add("active");
          running = true;

          while (running) {
            await stepEnv();
            await fetchState();

            await new Promise(r => setTimeout(r, 500));
          }
        }

        function stopDemo() {
          running = false;
        }

        function toggleLearning() {
            startDemo();
        }

        async function resetEnv(task) {
            try {
                await fetch('/reset', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({task: task})
                });
                rewards = [];
                if(chartInstance) {
                    chartInstance.destroy();
                    chartInstance = null;
                }
                currentEpisode++;
                fetchState();
            } catch (err) {}
        }

        // Initial fetch
        fetchState();
    </script>
</body>
</html>
